<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16"
     role="img" aria-label="RxShift Favicon 16px">
  <!-- Simplified 2×2 grid for 16px — cells 6×6, gap 2px -->
  <!-- Preserves amber/inactive brand pattern at minimum readable size -->
  <!-- TL=inactive, TR=active(amber), BL=upcoming, BR=inactive -->
  <rect x="1" y="1" width="6" height="6" rx="1.5" fill="#C4D2E2"/>
  <rect x="9" y="1" width="6" height="6" rx="1.5" fill="#F07C30"/>
  <rect x="1" y="9" width="6" height="6" rx="1.5" fill="#8FAABB"/>
  <rect x="9" y="9" width="6" height="6" rx="1.5" fill="#C4D2E2"/>
</svg>
